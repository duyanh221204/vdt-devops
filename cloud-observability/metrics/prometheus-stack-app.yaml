apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.2.2
    helm:
      values: |
        grafana:
          adminPassword: admin
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          service:
            type: NodePort
            nodePort: 32100

        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelectorNilUsesHelmValues: false
            retention: 2d
            scrapeInterval: 30s
            evaluationInterval: 30s
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 512Mi
                cpu: 500m
          service:
            type: NodePort
            nodePort: 32200

        alertmanager:
          enabled: true
          alertmanagerSpec:
            resources:
              requests:
                memory: 64Mi
                cpu: 30m
              limits:
                memory: 128Mi
                cpu: 100m

        # Giảm tải API server
        kube-state-metrics:
          resources:
            requests:
              memory: 64Mi
              cpu: 30m
            limits:
              memory: 128Mi
              cpu: 100m

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
