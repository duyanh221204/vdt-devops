# nano vdt-backend-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vdt-backend-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/duyanh221204/vdt-backend-config.git
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# kubectl apply -f vdt-backend-app.yaml
